services:
  - type: web
    name: langchain-rag
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: PORT
        value: 8000

  - type: web
    name: open-webui
    image: ghcr.io/open-webui/open-webui:dev
    plan: free
    ports:
      - port: 8080
        expose: true
    envVars:
      - key: OLLAMA_API_BASE_URL
        value: ""
      - key: RAG_API_BASE_URL
        value: https://langchain-rag.onrender.com
